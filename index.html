<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikasi Korektor Essay AI Cerdas untuk Guru oleh Agus Jemat">
    <title>Korektor Essay AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tesseract.js (Untuk OCR Tulisan Tangan/Foto) -->
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        #scoreCircle { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app">
        <!-- Header -->
        <nav class="gradient-bg text-white p-5 sticky top-0 z-50 shadow-lg">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 p-2 rounded-xl">
                        <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-black italic tracking-tighter uppercase">Korektor Essay AI</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
            
            <div class="grid lg:grid-cols-12 gap-6">
                <!-- Sisi Kiri: Input Guru -->
                <div class="lg:col-span-7 space-y-6">
                    <!-- Menu Soal -->
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 font-bold text-slate-700">
                                <i data-lucide="help-circle" class="w-5 h-5 text-indigo-500"></i> Pertanyaan / Soal Ujian
                            </div>
                            <button id="btnResetSoal" class="text-[10px] text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg font-bold uppercase tracking-widest transition-colors flex items-center gap-1">
                                <i data-lucide="trash-2" class="w-3 h-3"></i> Kosongkan
                            </button>
                        </div>
                        <textarea id="inputSoal" class="w-full h-24 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all" 
                                  placeholder="Tuliskan soal yang diberikan kepada siswa..."></textarea>
                    </section>

                    <!-- Menu Kunci (Opsional) -->
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 font-bold text-slate-700">
                                <i data-lucide="key-round" class="w-5 h-5 text-amber-500"></i> Kunci Jawaban
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold italic">Opsional</span>
                                <button id="btnResetKunci" class="text-[10px] text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg font-bold uppercase tracking-widest transition-colors flex items-center gap-1">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Kosongkan
                                </button>
                            </div>
                        </div>
                        <textarea id="kunciJawaban" class="w-full h-24 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all" 
                                  placeholder="Jika diisi, AI akan menggabungkan kunci ini dengan pengetahuannya..."></textarea>
                    </section>

                    <!-- Jawaban Siswa -->
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 font-bold text-slate-700">
                                <i data-lucide="user" class="w-5 h-5 text-blue-500"></i> Jawaban Siswa
                            </div>
                            <div class="flex items-center gap-2">
                                <button id="btnResetJawaban" class="text-[10px] text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg font-bold uppercase tracking-widest transition-colors flex items-center gap-1">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Kosongkan
                                </button>
                                <label class="cursor-pointer bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-indigo-100 transition-all">
                                    <i data-lucide="camera" class="w-3 h-3"></i> Upload Foto (OCR)
                                    <input type="file" id="uploadFoto" accept="image/*" class="hidden">
                                </label>
                            </div>
                        </div>
                        <div id="ocrStatus" class="hidden mb-3 text-[10px] bg-indigo-50 text-indigo-700 p-3 rounded-xl border border-indigo-100 italic flex items-center gap-2">
                            <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> <span id="ocrMsg">Membaca tulisan tangan...</span>
                        </div>
                        <textarea id="jawabanSiswa" class="w-full h-48 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all leading-relaxed" 
                                  placeholder="Ketik atau tempel jawaban siswa di sini..."></textarea>
                    </section>
                </div>

                <!-- Sisi Kanan: Kontrol & Hasil -->
                <div class="lg:col-span-5 space-y-6">
                    <!-- Pengaturan Poin -->
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center gap-3 mb-4">
                            <i data-lucide="sliders" class="text-indigo-600 w-5 h-5"></i>
                            <h2 class="font-bold text-slate-800">Target Nilai</h2>
                        </div>
                        <input type="number" id="maxPoin" value="100" min="1" max="1000" 
                               class="w-full px-4 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none font-black text-2xl text-indigo-600 text-center">
                        <p class="text-[10px] text-center text-slate-400 mt-2 font-bold uppercase tracking-widest">Maksimal Skor</p>
                    </section>

                    <!-- Tombol Aksi -->
                    <button id="btnProses" class="w-full py-6 gradient-bg text-white rounded-3xl font-black text-xl shadow-xl shadow-indigo-200 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4 group">
                        <i data-lucide="sparkles" class="group-hover:rotate-12 transition-transform"></i>
                        PROSES ANALISIS AI
                    </button>

                    <!-- Loading State -->
                    <div id="loadingArea" class="hidden bg-white p-10 rounded-3xl border border-slate-200 flex flex-col items-center justify-center space-y-4">
                        <div class="relative w-16 h-16">
                            <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
                            <div class="absolute inset-0 rounded-full border-4 border-t-indigo-600 animate-spin"></div>
                        </div>
                        <p id="loadingText" class="text-sm font-bold text-slate-500 text-center">Menghubungkan ke server AI...</p>
                    </div>

                    <!-- Result Section -->
                    <section id="resultArea" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-xl overflow-hidden">
                            <div class="flex flex-col items-center mb-8">
                                <div class="relative w-32 h-32 mb-4">
                                    <svg class="w-32 h-32 transform -rotate-90">
                                        <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="10" fill="transparent" class="text-slate-50" />
                                        <circle id="scoreCircle" cx="64" cy="64" r="58" stroke="currentColor" stroke-width="10" fill="transparent" stroke-dasharray="364.4" stroke-dashoffset="364.4" class="text-indigo-600" />
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                                        <span id="finalScore" class="text-4xl font-black text-slate-800">0</span>
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Skor</span>
                                    </div>
                                </div>
                                <h3 class="font-black text-slate-800 text-center uppercase tracking-widest text-sm">Hasil Koreksi AI</h3>
                            </div>

                            <div class="space-y-4">
                                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                    <div class="flex items-center gap-2 mb-2 text-indigo-600 font-bold text-xs uppercase tracking-widest">
                                        <i data-lucide="check-circle" class="w-3 h-3"></i> Analisis Feedback
                                    </div>
                                    <p id="feedbackText" class="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap"></p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <footer class="text-center py-10 text-slate-400 text-[10px] font-bold space-y-1 uppercase tracking-[0.2em]">
            <p>&copy; 2026 AGUS JEMAT • KOREKTOR ESSAY AI PRO</p>
            <p class="opacity-50 tracking-normal">Built for Teachers in Indonesia</p>
        </footer>
    </div>

    <script type="module">
        // API Key asli milik Anda
        const apiKey = "AIzaSyA3Ibs3GMbYn-5MSmEw1y16rU-OCAFlv6g"; 
        
        // Inisialisasi Ikon
        lucide.createIcons();

        // Elemen UI
        const btnProses = document.getElementById('btnProses');
        const uploadFoto = document.getElementById('uploadFoto');
        const ocrStatus = document.getElementById('ocrStatus');
        const ocrMsg = document.getElementById('ocrMsg');
        
        // Input Textareas
        const inputJawaban = document.getElementById('jawabanSiswa');
        const inputSoal = document.getElementById('inputSoal');
        const kunciJawaban = document.getElementById('kunciJawaban');
        
        // Output Areas
        const resultArea = document.getElementById('resultArea');
        const loadingArea = document.getElementById('loadingArea');
        const loadingText = document.getElementById('loadingText');
        const finalScore = document.getElementById('finalScore');
        const scoreCircle = document.getElementById('scoreCircle');
        const feedbackText = document.getElementById('feedbackText');
        const maxPoinInput = document.getElementById('maxPoin');

        // Tombol Reset / Kosongkan
        document.getElementById('btnResetSoal').onclick = () => {
            inputSoal.value = '';
        };
        
        document.getElementById('btnResetKunci').onclick = () => {
            kunciJawaban.value = '';
        };
        
        document.getElementById('btnResetJawaban').onclick = () => {
            inputJawaban.value = '';
            resultArea.classList.add('hidden'); 
        };

        // OCR Handler
        uploadFoto.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            ocrStatus.classList.remove('hidden');
            ocrMsg.innerText = "Mengaktifkan Sensor Kamera...";
            
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'ind', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            ocrMsg.innerText = `Sedang Membaca: ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                inputJawaban.value += (inputJawaban.value ? "\n" : "") + text;
                ocrMsg.innerText = "Berhasil Membaca!";
                setTimeout(() => ocrStatus.classList.add('hidden'), 2000);
            } catch (err) {
                ocrMsg.innerText = "Gagal membaca foto.";
                setTimeout(() => ocrStatus.classList.add('hidden'), 2000);
            }
        };

        // FUNGSI SUPER AUTO-DISCOVERY: AI yang mencari sendiri mana versi yang cocok!
        async function callGeminiAI(prompt) {
            let modelsToTry = [];
            
            // TAHAP 1: Tanya Google model apa saja yang bisa dipakai oleh API Key ini
            try {
                loadingText.innerText = "Mengecek izin akses server Google...";
                const checkUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
                const checkRes = await fetch(checkUrl);
                
                if (checkRes.ok) {
                    const data = await checkRes.json();
                    // Saring hanya model yang bisa merespons teks dan memiliki nama "gemini"
                    modelsToTry = data.models
                        .filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"))
                        .map(m => m.name.replace('models/', '')); // Hilangkan tulisan "models/" di depannya
                }
            } catch (e) {
                console.warn("Gagal mengecek daftar model:", e);
            }

            // Jika Gagal nanya ke Google, kita pakai daftar cadangan ini
            if (modelsToTry.length === 0) {
                modelsToTry = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-1.0-pro', 'gemini-pro'];
            }

            // Urutkan: Taruh versi 'flash' di paling atas karena lebih cepat merespons
            modelsToTry.sort((a, b) => {
                if (a.includes('flash') && !b.includes('flash')) return -1;
                if (!a.includes('flash') && b.includes('flash')) return 1;
                return 0;
            });

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.2 } // Suhu rendah agar jawaban objektif
            };

            let lastErrorMessage = "";

            // TAHAP 2: Coba panggil model satu per satu dari daftar
            for (const model of modelsToTry) {
                loadingText.innerText = `Menghubungkan ke ${model}...`;
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        lastErrorMessage = errorData.error?.message || "Ditolak.";
                        console.warn(`[GAGAL] Versi ${model} ditolak:`, lastErrorMessage);
                        continue; // JANGAN MENYERAH! Lanjut coba model berikutnya
                    }
                    
                    // JIKA BERHASIL!
                    const data = await response.json();
                    let textResult = data.candidates[0].content.parts[0].text;
                    
                    // Bersihkan JSON jika AI menambahkan format ```json ... ```
                    const firstBrace = textResult.indexOf('{');
                    const lastBrace = textResult.lastIndexOf('}');
                    if (firstBrace !== -1 && lastBrace !== -1) {
                        textResult = textResult.substring(firstBrace, lastBrace + 1);
                    }
                    
                    loadingText.innerText = `Berhasil memakai ${model}! Menyusun laporan...`;
                    return JSON.parse(textResult);

                } catch (err) {
                    console.warn(`[GAGAL] Error menjalankan ${model}:`, err);
                    continue; // Lanjut ke model berikutnya
                }
            }
            
            // TAHAP 3: Jika semua daftar sudah dicoba dan tidak ada yang berhasil
            throw new Error(lastErrorMessage || "API Key Anda saat ini tidak memiliki akses ke satupun versi AI dari Google.");
        }

        // Proses Analisis Utama
        btnProses.onclick = async () => {
            const soal = inputSoal.value.trim();
            const kunci = kunciJawaban.value.trim();
            const jawaban = inputJawaban.value.trim();
            const maxPoin = parseInt(maxPoinInput.value) || 100;

            if (!soal || !jawaban) {
                alert("Harap isi minimal Soal dan Jawaban Siswa.");
                return;
            }

            btnProses.disabled = true;
            resultArea.classList.add('hidden');
            loadingArea.classList.remove('hidden');

            const systemPrompt = `
                Anda adalah asisten guru profesional yang ahli dalam menilai jawaban essay siswa.
                TUGAS ANDA:
                1. Baca Soal.
                2. Bandingkan Jawaban Siswa dengan soal.
                3. Jika Kunci Jawaban tersedia, gunakan sebagai parameter utama. Jika KOSONG, gunakan standar keilmuan yang benar.
                4. Berikan SKOR (0 sampai ${maxPoin}).
                5. Berikan FEEDBACK dalam Bahasa Indonesia: analisis kelebihan, kekurangan, dan saran perbaikan.
                6. Output Anda HARUS berupa format JSON MURNI persis seperti format berikut ini: {"skor": 85, "feedback": "Penjelasan di sini..."}
                JANGAN TULIS APAPUN SELAIN FORMAT JSON TERSEBUT.
            `;

            const userPrompt = `
                SOAL: ${soal}
                KUNCI GURU: ${kunci || "TIDAK ADA"}
                JAWABAN SISWA: ${jawaban}
                MAX SKOR: ${maxPoin}
            `;

            try {
                const result = await callGeminiAI(systemPrompt + userPrompt);
                
                loadingArea.classList.add('hidden');
                resultArea.classList.remove('hidden');
                
                const targetSkor = result.skor;
                let currentDisp = 0;
                
                if (targetSkor === 0) {
                    finalScore.innerText = "0";
                    scoreCircle.style.strokeDashoffset = 364.4;
                } else {
                    const step = Math.ceil(targetSkor / 50); 
                    const interval = setInterval(() => {
                        currentDisp += step;
                        if (currentDisp >= targetSkor) {
                            currentDisp = targetSkor;
                            clearInterval(interval);
                        }
                        finalScore.innerText = currentDisp;
                        const offset = 364.4 - (364.4 * currentDisp / maxPoin);
                        scoreCircle.style.strokeDashoffset = offset;
                    }, 20);
                }

                feedbackText.innerText = result.feedback;
                
            } catch (err) {
                // Tampilkan pesan error lengkap ke layar
                alert("GAGAL MEMPROSES!\n\nAlasan: " + err.message + "\n\nPastikan API Key Anda aktif dan jaringan internet stabil.");
                loadingArea.classList.add('hidden');
            } finally {
                btnProses.disabled = false;
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>
